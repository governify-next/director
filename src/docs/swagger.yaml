openapi: 3.0.0
info:
    title: Express API Boilerplatesss
    version: 1.0.0
    description: A simple Express API with TypeScript
servers:
    - url: /
paths:
    /health:
        get:
            tags:
                - Health
            summary: Health check
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
    /api/v1/scripts:
        get:
            tags:
                - Scripts
            summary: List all scripts
            responses:
                '200':
                    description: A list of scripts
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/Script'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
    /api/v1/scripts/{name}:
        get:
            tags:
                - Scripts
            summary: Get script by name
            parameters:
                - in: path
                  name: name
                  required: true
                  schema:
                      type: string
                  description: Script name
            responses:
                '200':
                    description: Script found
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        $ref: '#/components/schemas/Script'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: Script not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/tasks:
        get:
            tags:
                - Tasks
            summary: List all tasks
            responses:
                '200':
                    description: A list of tasks
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/Task'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                            examples:
                                mixedValidTasks:
                                    summary: Valid mix of task types
                                    value:
                                        data:
                                            - _id: 67f0a1b2c3d4e5f607182930
                                              script: sum
                                              inputArgs:
                                                  a: 10
                                                  b: 25
                                              type: ONE_TIME
                                              enabled: true
                                              startDate: '2026-04-02T10:00:00.000Z'
                                              createdAt: '2026-04-01T09:00:00.000Z'
                                              updatedAt: '2026-04-01T09:00:00.000Z'
                                            - _id: 67f0a1b2c3d4e5f607182931
                                              script: sum
                                              inputArgs:
                                                  a: 3
                                                  b: 7
                                              type: RECURRING
                                              enabled: true
                                              startDate: '2026-04-02T10:00:00.000Z'
                                              endDate: '2026-04-09T10:00:00.000Z'
                                              interval: 60000
                                              createdAt: '2026-04-01T09:01:00.000Z'
                                              updatedAt: '2026-04-01T09:01:00.000Z'
                                            - _id: 67f0a1b2c3d4e5f607182932
                                              script: sum
                                              inputArgs:
                                                  a: 100
                                                  b: 250
                                              type: MANY_TIMES
                                              enabled: true
                                              startDate: '2026-04-02T10:00:00.000Z'
                                              runDates:
                                                  - '2026-04-02T10:01:00.000Z'
                                                  - '2026-04-02T10:05:00.000Z'
                                                  - '2026-04-02T10:10:00.000Z'
                                              createdAt: '2026-04-01T09:02:00.000Z'
                                              updatedAt: '2026-04-01T09:02:00.000Z'
                                        message: OK
                                        success: true
        post:
            tags:
                - Tasks
            summary: Create a new task
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TaskInput'
                        examples:
                            oneTimeSum:
                                $ref: '#/components/examples/TaskInputOneTimeSum'
                            recurringSum:
                                $ref: '#/components/examples/TaskInputRecurringSum'
                            manyTimesSum:
                                $ref: '#/components/examples/TaskInputManyTimesSum'
            responses:
                '201':
                    description: Task created
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        $ref: '#/components/schemas/Task'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '400':
                    description: Invalid input
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: Internal server error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/tasks/{id}:
        get:
            tags:
                - Tasks
            summary: Get task by ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Task ID (Mongo ObjectId)
            responses:
                '200':
                    description: Task found
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        $ref: '#/components/schemas/Task'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: Task not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        put:
            tags:
                - Tasks
            summary: Update task by ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Task ID (Mongo ObjectId)
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TaskInput'
                        examples:
                            oneTimeSum:
                                $ref: '#/components/examples/TaskInputOneTimeSum'
                            recurringSum:
                                $ref: '#/components/examples/TaskInputRecurringSum'
                            manyTimesSum:
                                $ref: '#/components/examples/TaskInputManyTimesSum'
            responses:
                '200':
                    description: Task updated
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        $ref: '#/components/schemas/Task'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: Task not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            tags:
                - Tasks
            summary: Delete task by ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Task ID (Mongo ObjectId)
            responses:
                '200':
                    description: Task deleted
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: 'null'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: Task not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/tasks/{id}/enable:
        post:
            tags:
                - Tasks
            summary: Enable task by ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Task ID (Mongo ObjectId)
            responses:
                '200':
                    description: Task enabled
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        $ref: '#/components/schemas/Task'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: Task not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/tasks/{id}/disable:
        post:
            tags:
                - Tasks
            summary: Disable task by ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Task ID (Mongo ObjectId)
            responses:
                '200':
                    description: Task disabled
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        $ref: '#/components/schemas/Task'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: Task not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/tasks/{id}/executions:
        get:
            tags:
                - Tasks
            summary: Get task executions by task ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Task ID (Mongo ObjectId)
            responses:
                '200':
                    description: List of task executions
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/TaskExecution'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: Task not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'

components:
    examples:
        TaskInputOneTimeSum:
            summary: ONE_TIME task using the sum script
            value:
                script: sum
                inputArgs:
                    a: 10
                    b: 25
                type: ONE_TIME
                enabled: true
                startDate: '2026-04-02T10:00:00.000Z'
        TaskInputRecurringSum:
            summary: RECURRING task using the sum script
            value:
                script: sum
                inputArgs:
                    a: 3
                    b: 7
                type: RECURRING
                enabled: true
                startDate: '2026-04-02T10:00:00.000Z'
                endDate: '2026-04-09T10:00:00.000Z'
                interval: 60000
        TaskInputManyTimesSum:
            summary: MANY_TIMES task using the sum script
            value:
                script: sum
                inputArgs:
                    a: 100
                    b: 250
                type: MANY_TIMES
                enabled: true
                startDate: '2026-04-02T10:00:00.000Z'
                runDates:
                    - '2026-04-02T10:01:00.000Z'
                    - '2026-04-02T10:05:00.000Z'
                    - '2026-04-02T10:10:00.000Z'
    schemas:
        Script:
            type: object
            required:
                - name
                - description
                - inputSchema
            properties:
                name:
                    type: string
                description:
                    type: string
                inputSchema:
                    type: object
        Task:
            oneOf:
                - $ref: '#/components/schemas/TaskOneTime'
                - $ref: '#/components/schemas/TaskRecurring'
                - $ref: '#/components/schemas/TaskManyTimes'
            discriminator:
                propertyName: type
                mapping:
                    ONE_TIME: '#/components/schemas/TaskOneTime'
                    RECURRING: '#/components/schemas/TaskRecurring'
                    MANY_TIMES: '#/components/schemas/TaskManyTimes'
        TaskBase:
            type: object
            required:
                - _id
                - script
                - type
                - enabled
                - startDate
            properties:
                _id:
                    type: string
                    description: MongoDB ObjectId
                script:
                    type: string
                    description: Reference to Script (name)
                inputArgs:
                    type: object
                    description: Input arguments for the script
                type:
                    type: string
                    enum: [ONE_TIME, RECURRING, MANY_TIMES]
                    description: Type of task
                enabled:
                    type: boolean
                    description: Whether task is enabled
                startDate:
                    type: string
                    format: date-time
                    description: When the task starts
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        TaskOneTime:
            allOf:
                - $ref: '#/components/schemas/TaskBase'
                - type: object
                  properties:
                      type:
                          type: string
                          enum: [ONE_TIME]
        TaskRecurring:
            allOf:
                - $ref: '#/components/schemas/TaskBase'
                - type: object
                  required:
                      - interval
                  properties:
                      type:
                          type: string
                          enum: [RECURRING]
                      endDate:
                          type: string
                          format: date-time
                          description: When the recurring task ends (optional)
                      interval:
                          type: number
                          description: Interval in milliseconds for recurring tasks
        TaskManyTimes:
            allOf:
                - $ref: '#/components/schemas/TaskBase'
                - type: object
                  required:
                      - runDates
                  properties:
                      type:
                          type: string
                          enum: [MANY_TIMES]
                      runDates:
                          type: array
                          items:
                              type: string
                              format: date-time
                          description: Specific dates to run for MANY_TIMES tasks
        TaskInput:
            type: object
            required:
                - script
                - type
                - startDate
            description: Input payload to create or update a task.
            properties:
                script:
                    type: string
                    description: Reference to Script (name)
                inputArgs:
                    type: object
                    description: Input arguments for the script
                type:
                    type: string
                    enum: [ONE_TIME, RECURRING, MANY_TIMES]
                    description: Type of task
                enabled:
                    type: boolean
                    description: Whether task is enabled (default true)
                startDate:
                    type: string
                    format: date-time
                    description: When the task starts
                endDate:
                    type: string
                    format: date-time
                    description: When the task ends (optional)
                interval:
                    type: number
                    description: Interval in milliseconds for recurring tasks (required if type is RECURRING)
                runDates:
                    type: array
                    items:
                        type: string
                        format: date-time
                    description: Specific dates to run for MANY_TIMES tasks (required if type is MANY_TIMES)
        TaskExecution:
            type: object
            properties:
                _id:
                    type: string
                    description: MongoDB ObjectId
                taskId:
                    type: string
                    description: Reference to Task ID
                status:
                    type: string
                    description: Execution status
                result:
                    type: object
                    description: Execution result
                error:
                    type: string
                    description: Error message if execution failed
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        Error:
            type: object
            properties:
                error:
                    type: string
                message:
                    type: string
